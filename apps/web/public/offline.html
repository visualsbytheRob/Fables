<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1625" />
    <title>Fables — Offline</title>
    <style>
      :root {
        --bg: #1a1625;
        --bg-panel: #231d35;
        --text: #e8e3f4;
        --text-dim: #9e9bb5;
        --accent: #a78bfa;
        --border: #2e2847;
        --radius: 8px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
      }

      .card {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 2.5rem 2rem;
        max-width: 380px;
        width: 100%;
        text-align: center;
      }

      .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      h1 {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--accent);
        margin: 0 0 0.5rem;
      }

      p {
        color: var(--text-dim);
        font-size: 0.9rem;
        line-height: 1.6;
        margin: 0 0 1.5rem;
      }

      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        padding: 0.65rem 1.5rem;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }

      button:hover { opacity: 0.9; }

      .hint {
        margin-top: 1rem;
        font-size: 0.78rem;
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📖</div>
      <h1>You're Offline</h1>
      <p>
        Fables couldn't reach the server. Your notes and stories are available
        in the local store — tap the button to keep writing.
      </p>
      <button onclick="window.location.href='/'">Open Fables</button>
      <p class="hint">Any edits made offline will sync automatically when you reconnect.</p>
    </div>
    <script>
      // Auto-redirect when back online
      window.addEventListener('online', () => window.location.href = '/');
    </script>
  </body>
</html>
